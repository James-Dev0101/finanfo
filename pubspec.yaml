name: finanfo
description: "Personal expense tracker with multi-currency support"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.5
  google_sign_in: ^6.3.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Charts
  fl_chart: ^0.70.2

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  currency_picker: ^2.0.18
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.3

  # Notifications
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.4.0
  timezone: ^0.10.1

  # Export
  csv: ^6.0.0
  pdf: ^3.12.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5

  # UI
  flutter_screenutil: ^5.9.3
  shimmer: ^3.0.0
  lottie: ^3.3.1
  flutter_svg: ^2.0.17
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  fonts:  
     - family: Inter
       fonts:
         - asset: assets/fonts/Inter-Regular.ttf
         - asset: assets/fonts/Inter-Medium.ttf
           weight: 500
         - asset: assets/fonts/Inter-SemiBold.ttf
           weight: 600
         - asset: assets/fonts/Inter-Bold.ttf
           weight: 700
